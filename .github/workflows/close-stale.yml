name: Close Old Issues and PRs

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    close-stale-items:
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write

        steps:
            - name: Close stale issues and PRs
              uses: actions/stale@v10
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
                  stale-issue-label: "stale"
                  stale-pr-label: "stale"
                  days-before-stale: 14
                  days-before-close: 3
                  
                  stale-issue-message: >
                      🕰️ This issue has been inactive for 14 days. 
                      
                      During GSSoC 2026, we want to ensure issues are actively worked on to give everyone a fair chance to contribute to SahiDawa! 🇮🇳 
                      If you are still working on this, please reply to this comment to keep it open. Otherwise, it will be unassigned/closed in 3 days.
                  
                  close-issue-message: >
                      🚫 Closing this issue due to inactivity. 
                      
                      If you'd still like to work on this for SahiDawa, feel free to reopen it or leave a comment! This allows us to re-assign the issue to the next available GSSoC contributor. 🙌
                  
                  stale-pr-message: >
                      🕰️ This Pull Request has been inactive for 14 days. 
                      
                      To keep the SahiDawa codebase clean during GSSoC 2026, PRs need to be actively updated. 
                      If you are still working on this, please push a commit or reply here! Otherwise, it will be closed in 3 days. 🚀
                  
                  close-pr-message: >
                      🚫 This PR was closed due to inactivity. 
                      
                      Thank you for your initial effort! If you decide to resume your work, just push a new commit or request a maintainer to reopen this PR. 🇮🇳
                  
                  exempt-issue-labels: "pinned,security,important,core-feature"
                  exempt-pr-labels: "work-in-progress,do-not-close"
                  remove-stale-when-updated: true
